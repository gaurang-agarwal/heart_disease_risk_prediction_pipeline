global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Scrape the Heart Disease prediction API /metrics endpoint
  - job_name: heart-api
    static_configs:
      - targets:
          - api:8000
    metrics_path: /metrics
    scheme: http

  # Scrape Prometheus itself for self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
