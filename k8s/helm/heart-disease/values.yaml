# Default values for heart-disease Helm chart.
# Override any of these with --set or a custom values file.

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: heart-api
  tag: latest
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Replica count
# ---------------------------------------------------------------------------
replicaCount: 1

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: NodePort
  port: 8000
  targetPort: 8000

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: "nginx"
  host: heart-disease.local
  path: /
  pathType: Prefix
  annotations: {}

# ---------------------------------------------------------------------------
# Environment variables (non-secret config)
# ---------------------------------------------------------------------------
env:
  MODEL_BUNDLE_PATH: "/app/models/bundle.joblib"
  MODEL_VERSION: "latest"
  LOG_LEVEL: "INFO"

# ---------------------------------------------------------------------------
# Probes
# ---------------------------------------------------------------------------
probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Prometheus ServiceMonitor (requires Prometheus Operator CRDs)
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: false
  interval: 15s
  path: /metrics
  namespace: monitoring

# ---------------------------------------------------------------------------
# Pod security context
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

# ---------------------------------------------------------------------------
# Node selectors / tolerations / affinity
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
