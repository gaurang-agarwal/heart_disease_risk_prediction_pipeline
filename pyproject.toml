[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
extend-exclude = '''
/(
  | \.git
  | \.venv
  | venv
  | build
  | dist
  | mlruns
  | data
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-ra"
markers = [
    "integration: marks tests that require external services (MLflow, etc.)",
    "smoke: quick smoke tests",
]

[tool.coverage.run]
source = ["src"]
omit = ["tests/*"]
