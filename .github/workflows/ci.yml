name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Lint: flake8 + black style check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8
        run: flake8 .

      - name: Run black (check mode)
        run: black --check .

  # ---------------------------------------------------------------------------
  # Job 2 — Test: pytest with coverage
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            -m "not integration_slow" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Job 3 — Train: data ingestion + model training
  # ---------------------------------------------------------------------------
  train:
    name: Train (MLflow file backend)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download raw dataset
        env:
          DATA_URL: ${{ vars.DATA_URL || 'https://raw.githubusercontent.com/kb22/Heart-Disease-Prediction/master/dataset.csv' }}
        run: python -m src.data.ingestion

      - name: Run full training pipeline
        env:
          MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
          EXPERIMENT_NAME: "heart-disease-ci"
        run: python -m src.models.train

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-bundle
          path: models/
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 4 — Docker build + smoke test
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-bundle
          path: models/

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile.api \
            -t heart-api:ci \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

      - name: Run container smoke test
        run: |
          docker run -d \
            -p 8000:8000 \
            --name heart-api-ci \
            heart-api:ci
          echo "Waiting for container to be ready..."
          sleep 8
          curl -f http://localhost:8000/health || \
            (docker logs heart-api-ci; exit 1)
          docker rm -f heart-api-ci

      - name: Push to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag heart-api:ci ghcr.io/${{ github.repository }}:latest
          docker tag heart-api:ci ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}